<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Password Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🔐 Password Generator</h1>

    <div class="output-box">
        <input type="text" id="password" readonly placeholder="Generate a password">
        <button id="copyBtn">📋 Copy</button>
    </div>

    <div class="settings">

        <label>
            Password Length
            <span id="lengthValue">12</span>
        </label>

        <input type="range" id="length" min="4" max="30" value="12">

        <div class="options">

            <label>
                <input type="checkbox" id="uppercase" checked>
                Uppercase Letters
            </label>

            <label>
                <input type="checkbox" id="lowercase" checked>
                Lowercase Letters
            </label>

            <label>
                <input type="checkbox" id="numbers" checked>
                Numbers
            </label>

            <label>
                <input type="checkbox" id="symbols" checked>
                Special Characters
            </label>

        </div>

        <button id="generateBtn">
            Generate Password
        </button>

        <div class="strength">

            <div class="strength-header">
                <span>Password Strength</span>
                <span id="strengthText">Medium</span>
            </div>

            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>

        </div>

    </div>

    <p class="footer-text">
        WD-FSWD-A4/May-1017 LAKSHMIKANTH MANIBOLU
    </p>

</div>

<div id="toast" class="toast">
    Password Copied Successfully!
</div>

<script src="script.js"></script>

</body>
</html>
